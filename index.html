<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png" />
		<link rel="stylesheet" href="./styles/main.css" />

		<title>Frontend Mentor | Product preview card component</title>
	</head>
	<body>
		<main>
			<div class="container">
				<article class="productCard">
					<figure>
						<picture>
							<source srcset="./images/image-product-desktop.jpg" media="(min-width:48rem)" />
							<img src="./images/image-product-mobile.jpg" alt="Gabrielle Essence perfume bottle" class="img-fluid" />
						</picture>

						<figcaption class="sr-only">Gabrielle Essence — 50 ml Eau de Parfum, limited edition</figcaption>
					</figure>

					<div class="productCard__content">
						<span class="productCard__content-tag">perfume</span>
						<h1>Gabrielle Essence Eau De Parfum</h1>
						<p>A floral, solar and voluptuous interpretation composed by Olivier Polge, Perfumer-Creator for the House of CHANEL.</p>

						<p class="productCard__content-price">
							<strong>$149.99</strong>
							<del>$169.99</del>
						</p>

						<button type="button">
							<img src="./images/icon-cart.svg" alt="Icon image of a shopping cart" />
							<span>Add to Cart</span>
						</button>
					</div>
				</article>
			</div>
		</main>

		<footer>
			<p>
				Challenge by
				<a href="https://www.frontendmentor.io?ref=challenge" target="_blank" rel="noopener noreferrer" aria-label="Frontend Mentor (opens in a new tab)"
					>Frontend Mentor <span class="sr-only"></span> </a
				>. Coded by <a href="#">João Rodrigues</a>.
			</p>
		</footer>
	</body>
</html>
